# Build CGO-backed binaries for every platform the install script expects, attach
# SHA256SUMS, and cut a GitHub Release. Trigger: push tag v* (e.g. v0.1.0).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24.x"

jobs:
  darwin:
    name: macOS (amd64 + arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: go build -buildvcs=false -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o looptap-darwin-amd64 .
      - name: arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: go build -buildvcs=false -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o looptap-darwin-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-darwin-amd64
          path: looptap-darwin-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: bin-darwin-arm64
          path: looptap-darwin-arm64

  linux-glibc-amd64:
    name: Linux glibc amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: CGO_ENABLED=1 go build -buildvcs=false -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o looptap-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-linux-amd64
          path: looptap-linux-amd64

  linux-glibc-arm64:
    name: Linux glibc arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: CGO_ENABLED=1 go build -buildvcs=false -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o looptap-linux-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-linux-arm64
          path: looptap-linux-arm64

  linux-musl-amd64:
    name: Linux musl amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker run --rm -v "${PWD}:/src" -w /src golang:1.24-alpine sh -ec '
            apk add --no-cache build-base sqlite-dev git
            CGO_ENABLED=1 go build -buildvcs=false -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o looptap-linux-amd64-musl .
          '
      - uses: actions/upload-artifact@v4
        with:
          name: bin-linux-amd64-musl
          path: looptap-linux-amd64-musl

  linux-musl-arm64:
    name: Linux musl arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker run --rm -v "${PWD}:/src" -w /src golang:1.24-alpine sh -ec '
            apk add --no-cache build-base sqlite-dev git
            CGO_ENABLED=1 go build -buildvcs=false -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o looptap-linux-arm64-musl .
          '
      - uses: actions/upload-artifact@v4
        with:
          name: bin-linux-arm64-musl
          path: looptap-linux-arm64-musl

  publish:
    name: GitHub Release + SHA256SUMS
    needs:
      - darwin
      - linux-glibc-amd64
      - linux-glibc-arm64
      - linux-musl-amd64
      - linux-musl-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten & checksum
        run: |
          mkdir -p release
          find artifacts -type f -name 'looptap-*' -exec cp {} release/ \;
          cd release
          sha256sum looptap-* | sort -k2 > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes "Install: \`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash\`" \
            release/*
