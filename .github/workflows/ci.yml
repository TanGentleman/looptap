# Build from source, run tests, lint the automation, and smoke the binary on every push and PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.24.x"

jobs:
  lint-automation:
    name: Lint workflows & scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: actionlint
        run: "$(go env GOPATH)/bin/actionlint"

      - name: shellcheck
        run: shellcheck scripts/*.sh

      - name: shfmt
        run: "$(go env GOPATH)/bin/shfmt" -d scripts/*.sh

  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install SQLite dev headers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Vet
        run: go vet ./...

      - name: Test (race detector on)
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o looptap .

      - name: "Smoke: binary boots and SQLite migration runs"
        run: ./scripts/smoke-db.sh ./looptap /tmp/ci-smoke.db
