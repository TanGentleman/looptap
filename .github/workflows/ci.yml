# Build from source, run tests, and verify the binary boots on every push and PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.24.x"

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install SQLite dev headers
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Vet
        run: go vet ./...

      - name: Test (race detector on)
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o looptap .

      - name: "Smoke: binary boots and SQLite migration runs"
        run: |
          ./looptap info --db /tmp/ci-smoke.db
          test -f /tmp/ci-smoke.db
